name: Publish image

on:
  push:
    tags:
      - 'v*.*.*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Derive release metadata
        id: release
        shell: bash
        run: |
          release_version="${GITHUB_REF_NAME}"
          if [[ ! "${release_version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "expected semver tag like v1.0.0, got ${release_version}" >&2
            exit 1
          fi

          major_version="${release_version%%.*}"
          cli_version="$(tr -d '\n' < CLI_VERSION)"

          if [[ -z "${cli_version}" ]]; then
            echo "CLI_VERSION is empty" >&2
            exit 1
          fi

          {
            echo "release_version=${release_version}"
            echo "major_version=${major_version}"
            echo "cli_version=${cli_version}"
          } >> "${GITHUB_OUTPUT}"

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CLI_VERSION=${{ steps.release.outputs.cli_version }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.major_version }}
            ghcr.io/${{ github.repository }}:${{ steps.release.outputs.release_version }}
            ghcr.io/${{ github.repository }}:${{ github.sha }}
