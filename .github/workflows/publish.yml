name: Publish image

on:
  workflow_dispatch:
    inputs:
      cli_version:
        description: CLI version to bake into the image
        required: true
      cli_download_url:
        description: Base URL to download the CLI from
        required: false

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          build-args: |
            CLI_VERSION=${{ inputs.cli_version }}
            CLI_DOWNLOAD_URL=${{ inputs.cli_download_url || 'https://www.devopsellence.com/lfg.sh' }}
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}
